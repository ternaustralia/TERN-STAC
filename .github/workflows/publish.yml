name: publish

on:
  push:
    tags:
      - "v*"
      - "test-*"

permissions:
  contents: read
  id-token: write

jobs:
  publish-pypi:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install --upgrade build setuptools-scm
      - id: scm-version
        name: resolve setuptools_scm version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "SCM_VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "Resolved version: $VERSION"
      - name: build distribution
        env:
          SETUPTOOLS_SCM_PRETEND_VERSION: ${{ env.SCM_VERSION }}
        run: python -m build
      - uses: pypa/gh-action-pypi-publish@release/v1

  publish-testpypi:
    if: startsWith(github.ref, 'refs/tags/test-')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install --upgrade build setuptools-scm
      - id: scm-version
        name: resolve setuptools_scm version
        run: |
          VERSION="${GITHUB_REF_NAME#test-}"
          echo "SCM_VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "Resolved version: $VERSION"
      - name: build distribution
        env:
          SETUPTOOLS_SCM_PRETEND_VERSION: ${{ env.SCM_VERSION }}
        run: python -m build
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          skip-existing: true
